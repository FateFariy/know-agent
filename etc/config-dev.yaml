Http:
  Name: rag
  Host: 0.0.0.0
  Port: 8080
  Mode: dev
#  Middlewares:
#    Recover: false
#    Timeout: false

Auth:
  AccessSecret: your-access-secret-key
  AccessExpire: 2h

Mysql:
  Host: 10.104.0.165
  Port: 3306
  Username: root
  Password: "123456"
  DbName: rag

Redis:
  - Host: 10.104.0.165:6379
    Type: node
    Weight: 100

Minio:
  Endpoint: 10.104.1.173:9000
  AccessKeyID: minioadmin
  SecretAccessKey: minioadmin
  BucketName: agent-document
  ObjectPrefix: rag/document
  ParsedTextPrefix: rag/parsed-text
  UseSSL: false

Neo4j:
  Enabled: false
  Uri: bolt://127.0.0.1:7687
  Username: neo4j
  Password: neo4j
  Database: neo4j
  QueryTimeoutSeconds: 5

MQ:
  Endpoint: 10.104.1.173:9876
  ParseTopic: know-agent-parse
  IndexTopic: know-agent-index
  Enabled: false

StructureParsing:
  LLMDisambiguationEnabled: true
  MaxAmbiguousSignalsPerCall: 8
  ContextWindowLines: 2
  MaxPlainHeadingChars: 32
  AmbiguityConfidenceFloor: 0.45
  AmbiguityConfidenceCeil: 0.80

Embedding:
  Model: doubao-embedding-vision-251215
  APIKey: REPLACE_YOUR_ARK_KEY
  APIType: multi_modal
  Dimensions: 1024

Chunk:
  RecursiveMaxChars: 800
  RecursiveOverlapChars: 120
  SemanticMaxChars: 700
  SemanticMinChars: 240
  SemanticSimilarityThreshold: 0.18
  LlmEnabled: false
  LlmMaxChars: 3500
  RecommendLlmWhenLowQuality: true

Milvus:
  Addr: 10.104.1.173:19530
  Collection: document_chunk_collection
  MetricType: COSINE

Chat:
  RewriteEnabled: true
  RecommendationEnabled: true
  Memory:
    StrategyType: summary_compression
    HistorySummary:
      Enabled: true
      KeepRecentTurns: 3
      CompressionBatchTurns: 3
      SummaryMaxChars: 1024
    RewriteHistoryTurns: 4
    RecentTranscriptMaxChars: 1024
    QuestionHistoryMaxChars: 512
    RewriteEnabled: true
    MaxSubQuestions: 5
  Rewrite:
    Enabled: true
    MaxSubQuestions: 5
    Temperature: 0.1
    TopP: 0.3
    Thinking: false
  Recommendation:
    Enabled: true
    Timeout: 5s
    HistoryPreviewTurns: 3
  Rag:
    Enabled: true
    RerankEnabled: true
    NoEvidenceReply:
    SystemPrompt:
    ChannelTimeout: 5s
    SubQuestionTimeout: 12s
    KeywordTopK: 8
    VectorTopK: 8
    CandidateTopK: 10
    FinalTopK: 5
    ParentEvidenceMaxChars: 1024
    MinVectorSimilarity: 0.5
    KeywordRelativeScoreFloor: 0.35
    PlanningHistoryMaxChars: 2000
    QuestionHistoryMaxChars: 1000
    TotalEvidenceMaxChars: 5200
    PerSubQuestionEvidenceMaxChars: 2200
    Rerank:
      Enabled: false
      URL:
      ApiKey:
      Model:
      TopN: 5
      ConnectTimeout: 3s
      ReadTimeout: 6s
  Agent:
    RecommendationEnabled: true
    MaxModelCallsPerRun: 8
    MaxModelCallsPerThread: 40
    MaxToolCallsPerRun: 6
    MaxToolCallsPerThread: 30
    HistoryPreviewTurns: 4
    RecommendationTimeout: 5s
    SystemPrompt:
    RecommendationPrompt:

ChatModel:
  Ark:
    Model: doubao-seed-2-0-mini-260428
    BaseURL: https://ark.cn-beijing.volces.com/api/v3
    ApiKey: REPLACE_YOUR_ARK_KEY
    Temperature: 0.1
    MaxTokens: 1024
    TopP: 0.3
    InputTokenCost1k: 0.0001
    OutputTokenCost1k: 0.0001
